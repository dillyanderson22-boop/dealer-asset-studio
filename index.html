<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealer Asset Studio</title>
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --panel2:#f6f6f7; --line:#e6e6e8;
    --txt:#0a0a0a; --mut:#7a7a82; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1180px;margin:0 auto;padding:34px 22px 90px}
  header.top{display:flex;align-items:center;gap:13px;margin-bottom:4px}
  .logo{width:40px;height:40px;border-radius:11px;background:#0a0a0a;display:grid;place-items:center;
    font-weight:800;font-size:20px;color:#fff}
  h1{font-size:21px;margin:0;letter-spacing:-.4px;font-weight:750}
  .sub{color:var(--mut);font-size:13.5px;margin:2px 0 26px}

  .crumb{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--mut);margin-bottom:18px;flex-wrap:wrap}
  .crumb a{color:#0a0a0a;font-weight:600;cursor:pointer;text-decoration:none}
  .crumb a:hover{text-decoration:underline}
  .crumb span.sep{color:#cfcfd4}

  .btn{background:#0a0a0a;color:#fff;border:none;padding:11px 18px;border-radius:11px;font-size:14px;
    font-weight:650;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:#262626;transform:translateY(-1px)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--txt)}
  .btn.ghost:hover{background:var(--panel2)}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
  .btn.danger{background:#fff;border:1px solid #f0d6d6;color:#c0392b}
  .btn.danger:hover{background:#fbf1f1}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  input,select{background:#fff;border:1px solid var(--line);color:var(--txt);padding:11px 13px;
    border-radius:10px;font-size:14px;outline:none;transition:.15s;font-family:inherit}
  input::placeholder{color:#b3b3ba}
  input:focus,select:focus{border-color:#0a0a0a;box-shadow:0 0 0 3px rgba(10,10,10,.07)}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
  .toolbar .grow{flex:1;min-width:160px}
  .title-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .title-row h2{font-size:24px;margin:0;letter-spacing:-.5px}

  .grid{display:grid;gap:16px}
  .grid.cards{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .grid.brands{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
  .grid.assets{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
    transition:.15s;cursor:pointer;position:relative}
  .card:hover{border-color:#bcbcc2;box-shadow:0 6px 20px rgba(0,0,0,.06);transform:translateY(-2px)}
  .card .ttl{font-size:16px;font-weight:700;margin:0 0 4px;letter-spacing:-.2px}
  .card .meta{font-size:12.5px;color:var(--mut)}
  .card .logos{display:flex;gap:6px;flex-wrap:wrap;margin-top:13px}

  .wordmark{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:7px;
    font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1.1}
  .logoimg{width:100%;height:84px;object-fit:contain;border-radius:8px;background:#fafafa;border:1px solid var(--line)}

  .bcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
    cursor:pointer;transition:.15s;text-align:center}
  .bcard:hover{border-color:#bcbcc2;box-shadow:0 6px 20px rgba(0,0,0,.06);transform:translateY(-2px)}
  .bcard .logobox{height:96px;display:grid;place-items:center;margin-bottom:12px}
  .bcard .wordmark.big{font-size:18px;padding:14px 18px;border-radius:10px}
  .bcard .bname{font-weight:700;font-size:14.5px}
  .bcard .bmeta{font-size:12px;color:var(--mut);margin-top:3px}

  .acard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;position:relative}
  .acard .img{width:100%;height:150px;object-fit:contain;background:
    linear-gradient(45deg,#f3f3f4 25%,transparent 25%,transparent 75%,#f3f3f4 75%) 0 0/18px 18px,
    linear-gradient(45deg,#f3f3f4 25%,#fff 25%,#fff 75%,#f3f3f4 75%) 9px 9px/18px 18px;display:block}
  .acard .arow{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;gap:6px;border-top:1px solid var(--line)}
  .acard .aname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .acard .iconbtn{background:none;border:none;cursor:pointer;color:var(--mut);font-size:13px;padding:3px 5px;border-radius:6px}
  .acard .iconbtn:hover{background:var(--panel2);color:#0a0a0a}
  .acard.sel{outline:2px solid #0a0a0a;outline-offset:-1px}
  .acard .chk{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);
    background:rgba(255,255,255,.9);display:none;align-items:center;justify-content:center;font-size:13px;font-weight:800}
  .selectable .acard{cursor:pointer}
  .selectable .acard .chk{display:flex}
  .acard.sel .chk{background:#0a0a0a;color:#fff;border-color:#0a0a0a}

  .dropzone{border:2px dashed var(--line);border-radius:14px;padding:34px 20px;text-align:center;color:var(--mut);
    cursor:pointer;transition:.15s;margin-bottom:22px;background:var(--panel2)}
  .dropzone:hover,.dropzone.drag{border-color:#0a0a0a;color:#0a0a0a;background:#fafafa}
  .dropzone b{color:#0a0a0a}
  .dropzone .big{font-size:30px;margin-bottom:6px}

  .empty{border:1px dashed var(--line);border-radius:14px;padding:46px 20px;text-align:center;color:var(--mut);font-size:14px}
  .empty b{color:var(--txt)}

  .status{font-size:13px;padding:11px 14px;border-radius:10px;margin-top:12px;display:none;line-height:1.45}
  .status.show{display:block}
  .status.ok{background:#f0f9f4;color:#0a7f55;border:1px solid #cdeeda}
  .status.err{background:#fbf1f1;color:#a33;border:1px solid #f0d6d6}
  .status.info{background:var(--panel2);color:#444;border:1px solid var(--line)}
  .status a{color:#0a0a0a;font-weight:600;cursor:pointer}
  .status.load{background:var(--panel2);color:#333;border:1px solid var(--line)}
  .spinner{display:inline-block;width:15px;height:15px;border:2px solid #d2d5dd;border-top-color:#0a0a0a;
    border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:9px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .scanbar{height:3px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:10px}
  .scanbar i{display:block;height:100%;width:40%;background:#0a0a0a;border-radius:3px;animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
  .btn .spinner{width:13px;height:13px;border-color:rgba(255,255,255,.4);border-top-color:#fff;margin-right:7px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,15,18,.45);display:none;align-items:flex-start;justify-content:center;
    padding:60px 18px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .modal.wide{max-width:840px}
  .modal h3{margin:0 0 4px;font-size:18px}
  .modal p.h{color:var(--mut);font-size:13px;margin:0 0 18px}
  .promptscroll{max-height:62vh;overflow:auto;padding-right:4px;margin:0 -4px;padding-left:4px}
  .pblock{border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:13px;background:#fff}
  .pblock.style{background:#faf7f2;border-color:#ece3d4}
  .pblock .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .pblock .pt{font-size:13px;font-weight:700}
  .pblock .pt small{color:var(--mut);font-weight:600;margin-left:6px}
  .pblock textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:9px;padding:10px 11px;
    font-size:12px;line-height:1.5;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical;outline:none;color:#333;background:#fcfcfd}
  .pblock textarea:focus{border-color:#0a0a0a}
  .camphead{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#0a0a0a;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .camphead .swatch{width:13px;height:13px;border-radius:4px}
  .copied{color:#0a7f55!important}
  .modal .field{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
  .modal label{font-size:12px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .modal input,.modal select{width:100%}
  .modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;max-height:280px;overflow:auto;
    padding:4px;border:1px solid var(--line);border-radius:10px}
  .pickgrid .pwm{cursor:pointer;border:1.5px solid var(--line);border-radius:9px;padding:10px 6px;text-align:center;transition:.12s}
  .pickgrid .pwm:hover{border-color:#0a0a0a}
  .pickgrid .pwm.on{border-color:#0a0a0a;background:#fafafa}
  .pickgrid .dot{width:14px;height:14px;border-radius:4px;display:inline-block;margin-bottom:5px}
  .pickgrid .pn{font-size:11px;font-weight:600;display:block}

  .footer{text-align:center;color:var(--mut);font-size:12px;margin-top:42px}
  .count-pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
    padding:6px 12px;border-radius:30px;font-size:12.5px;font-weight:600}
  .scanbox{margin-top:12px;display:none}
  .scanbox.show{display:block}
  .scanbox textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:13px;font-family:inherit;resize:vertical;outline:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">◆</div>
    <div><h1>Dealer Asset Studio</h1></div>
  </header>
  <p class="sub">Organize emblem artwork by dealership and manufacturer, then send the dealership a share list to approve.</p>

  <div id="app"></div>

  <div class="footer">Built for Ayden · saved locally on this device · open in Chrome for best results</div>
</div>

<!-- MODAL HOST -->
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ===================== BRAND DATA ===================== */
const BRANDS = [
  {n:"Acura",c:"#0a0a0a"},{n:"Alfa Romeo",c:"#8a1e03"},{n:"Audi",c:"#bb0a30"},{n:"BMW",c:"#0066b1"},
  {n:"Buick",c:"#9c1b27"},{n:"Cadillac",c:"#0b0b0b"},{n:"Chevrolet",c:"#142b4a"},{n:"Chrysler",c:"#002a5c"},
  {n:"Dodge",c:"#c8102e"},{n:"Fiat",c:"#8c1a1f"},{n:"Ford",c:"#00274d"},{n:"Genesis",c:"#16181d"},
  {n:"GMC",c:"#c8102e"},{n:"Honda",c:"#10100f"},{n:"Hyundai",c:"#002c5f"},{n:"Infiniti",c:"#16181d"},
  {n:"Jaguar",c:"#0a0a0a"},{n:"Jeep",c:"#3a4226"},{n:"Kia",c:"#05141f"},{n:"Land Rover",c:"#005a2b"},
  {n:"Lexus",c:"#16181d"},{n:"Lincoln",c:"#0b0b0b"},{n:"Maserati",c:"#0a1f44"},{n:"Mazda",c:"#a6192e"},
  {n:"Mercedes-Benz",c:"#0b0b0b"},{n:"MINI",c:"#0b0b0b"},{n:"Mitsubishi",c:"#b30013"},{n:"Nissan",c:"#c3002f"},
  {n:"Porsche",c:"#0b0b0b"},{n:"Ram",c:"#0b0b0b"},{n:"Subaru",c:"#004b91"},{n:"Tesla",c:"#cc0000"},
  {n:"Toyota",c:"#c8102e"},{n:"Volkswagen",c:"#001e50"},{n:"Volvo",c:"#16181d"},
];
const ALIAS={"Mercedes-Benz":["mercedes","mercedes-benz","mercedes benz","benz"],"Volkswagen":["volkswagen","vw"],
  "Land Rover":["land rover","landrover","range rover"],"Chevrolet":["chevrolet","chevy"],"MINI":["mini cooper"],"Ram":["ram truck"]};
/* seasonal/holiday campaigns used to build image-generation prompts */
const CAMPAIGNS=[
  {id:"newyear",label:"New Year",head:["NEW YEAR","SAVINGS"],motif:"sparkling golden fireworks, confetti and celebration sparkles",bg:"festive midnight celebration with golden sparkles and confetti"},
  {id:"presidents",label:"Presidents Day",head:["PRESIDENTS DAY"],tag:"SALES EVENT",motif:"patriotic silver stars with red, white and blue accents",bg:"clean patriotic red, white and blue field with stars"},
  {id:"valentine",label:"Valentine's Day",head:["SWEETHEART","SAVINGS"],motif:"glossy chrome hearts",bg:"soft romantic red and silver with subtle bokeh hearts"},
  {id:"stpatrick",label:"St. Patrick's Day",head:["LUCKY","DEALS"],motif:"shiny green shamrocks and gold coins",bg:"festive emerald green with gold sparkle"},
  {id:"spring",label:"Spring",head:["SPRING INTO","SAVINGS"],motif:"fresh green leaves and blossoms",bg:"bright fresh spring greenery and blossoms in soft light"},
  {id:"memorial",label:"Memorial Day",head:["MEMORIAL DAY","SALE"],motif:"American flag stars and stripes with silver stars",bg:"respectful clean stars-and-stripes patriotic theme"},
  {id:"summer",label:"Summer",head:["SUMMER","SALES EVENT"],motif:"bright sun rays and warm metallic highlights",bg:"sunny bright sky-blue and warm gold summer scene"},
  {id:"july4",label:"4th of July",head:["4TH OF JULY","SAVINGS"],motif:"red, white and blue fireworks bursting with silver stars and American flag accents",bg:"explosive patriotic fireworks over deep blue night sky"},
  {id:"laborday",label:"Labor Day",head:["LABOR DAY","SALE"],motif:"bold silver stars and strong accents",bg:"strong blue with silver stars, end-of-summer feel"},
  {id:"fall",label:"Fall",head:["FALL INTO","SAVINGS"],motif:"orange and golden autumn maple leaves",bg:"warm autumn amber and deep blue with falling maple leaves"},
  {id:"blackfri",label:"Black Friday",head:["BLACK FRIDAY","DEALS"],motif:"bold gold accents on black with premium sparkle",bg:"dramatic black with gold light streaks"},
  {id:"holiday",label:"Holiday / Christmas",head:["HOLIDAY","SAVINGS"],motif:"silver snowflakes, frost and festive sparkle",bg:"festive winter with snowflakes and a warm holiday glow"},
  {id:"winter",label:"Winter",head:["WINTER WONDER","DEALS"],motif:"crystalline silver snowflakes and frost texture",bg:"icy blue winter with frost and falling snowflakes"},
  {id:"yearend",label:"Year End",head:["YEAR END","CLEARANCE"],motif:"bold silver stars and a clearance burst",bg:"high-impact blue and silver clearance theme"},
];
function brandColor(name){const b=BRANDS.find(x=>x.n.toLowerCase()===name.toLowerCase());return b?b.c:"#0a0a0a";}
function luma(hex){const h=hex.replace('#','');return 0.2126*parseInt(h.substr(0,2),16)+0.7152*parseInt(h.substr(2,2),16)+0.0722*parseInt(h.substr(4,2),16);}
function textOn(hex){return luma(hex)>150?'#0a0a0a':'#ffffff';}
function wordmark(name,color,cls=''){return `<span class="wordmark ${cls}" style="background:${color};color:${textOn(color)}">${esc(name)}</span>`;}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

/* ===================== INDEXEDDB ===================== */
const DB_NAME='DealerAssetStudio', DB_VER=1;
let _db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const db=e.target.result;
    if(!db.objectStoreNames.contains('dealers')) db.createObjectStore('dealers',{keyPath:'id'});
    if(!db.objectStoreNames.contains('brands')){const s=db.createObjectStore('brands',{keyPath:'id'});s.createIndex('dealerId','dealerId');}
    if(!db.objectStoreNames.contains('assets')){const s=db.createObjectStore('assets',{keyPath:'id'});s.createIndex('brandId','brandId');}
  };
  r.onsuccess=e=>{_db=e.target.result;res(_db);};
  r.onerror=e=>rej(e.target.error);
});}
function tx(store,mode='readonly'){return _db.transaction(store,mode).objectStore(store);}
function dbAll(store){return new Promise((res,rej)=>{const out=[];const c=tx(store).openCursor();c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else res(out);};c.onerror=e=>rej(e.target.error);});}
function dbByIndex(store,idx,val){return new Promise((res,rej)=>{const out=[];const c=tx(store).index(idx).openCursor(IDBKeyRange.only(val));c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else res(out);};c.onerror=e=>rej(e.target.error);});}
function dbGet(store,id){return new Promise((res,rej)=>{const r=tx(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
function dbPut(store,val){return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(val);r.onsuccess=()=>res(val);r.onerror=e=>rej(e.target.error);});}
function dbDel(store,id){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=e=>rej(e.target.error);});}

/* ===================== STATE / ROUTER ===================== */
let view={name:'home'};
const app=document.getElementById('app');
let objURLs=[];
function freshURL(blob){const u=URL.createObjectURL(blob);objURLs.push(u);return u;}
function clearURLs(){objURLs.forEach(u=>URL.revokeObjectURL(u));objURLs=[];}

async function go(v){view=v;await render();window.scrollTo({top:0,behavior:'smooth'});}

async function render(){
  clearURLs();
  if(view.name==='home') return renderHome();
  if(view.name==='dealer') return renderDealer(view.dealerId);
  if(view.name==='brand') return renderBrand(view.brandId);
  if(view.name==='share') return renderShare(view.dealerId);
}

/* ===================== HOME ===================== */
async function renderHome(){
  const dealers=await dbAll('dealers');
  let html=`<div class="title-row"><h2>Dealerships</h2></div>
    <div class="toolbar">
      <input class="grow" id="newUrl" placeholder="Paste a dealership URL — e.g. stephenwadehonda.com" onkeydown="if(event.key==='Enter')addDealerFromUrl()">
      <button class="btn" id="addBtn" onclick="addDealerFromUrl()">Add dealership</button>
    </div>
    <div class="status" id="status"></div>
    <p class="sub" style="margin:14px 0 22px">Just paste the URL — it pulls the dealership name and detects the manufacturers automatically.</p>`;
  if(!dealers.length){
    html+=`<div class="empty"><b>No dealerships yet.</b><br>Paste a dealership URL above to add your first one.</div>`;
    app.innerHTML=html;return;
  }
  const cards=await Promise.all(dealers.sort((a,b)=>b.createdAt-a.createdAt).map(async d=>{
    const brands=await dbByIndex('brands','dealerId',d.id);
    let assetCount=0;for(const b of brands){assetCount+=(await dbByIndex('assets','brandId',b.id)).length;}
    const logos=brands.slice(0,6).map(b=>wordmark(b.name,b.color)).join('');
    return `<div class="card" onclick="go({name:'dealer',dealerId:'${d.id}'})">
      <p class="ttl">${esc(d.name)}</p>
      <p class="meta">${brands.length} manufacturer${brands.length!==1?'s':''} · ${assetCount} image${assetCount!==1?'s':''}</p>
      <div class="logos">${logos||'<span class="meta">No manufacturers yet</span>'}</div>
    </div>`;
  }));
  html+=`<div class="grid cards">${cards.join('')}</div>`;
  app.innerHTML=html;
}

/* ===================== DEALER ===================== */
async function renderDealer(dealerId){
  const d=await dbGet('dealers',dealerId);
  if(!d){return go({name:'home'});}
  const brands=(await dbByIndex('brands','dealerId',dealerId)).sort((a,b)=>a.name.localeCompare(b.name));
  let totalAssets=0;const counts={};
  for(const b of brands){const a=await dbByIndex('assets','brandId',b.id);counts[b.id]=a.length;totalAssets+=a.length;}
  let html=`<div class="crumb"><a onclick="go({name:'home'})">Dealerships</a><span class="sep">/</span><b>${esc(d.name)}</b></div>
    <div class="title-row"><h2>${esc(d.name)}</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn ghost" onclick="scanDealer('${d.id}')">⟳ Auto-detect brands</button>
        <button class="btn ghost" onclick="addBrandModal('${d.id}')">+ Add manufacturer</button>
        <button class="btn" onclick="go({name:'share',dealerId:'${d.id}'})" ${totalAssets?'':'disabled'}>Create share list →</button>
      </div>
    </div>
    <p class="sub" style="margin:0 0 8px">${d.url?`<a href="${esc(d.url)}" target="_blank" style="color:#0a0a0a">${esc(d.url)}</a> · `:''}${brands.length} manufacturer${brands.length!==1?'s':''} · ${totalAssets} image${totalAssets!==1?'s':''}</p>
    <div class="status" id="status"></div>
    <div class="scanbox" id="scanbox"><textarea id="pastearea" placeholder="Paste the dealership homepage text here, then click Scan…"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px"><button class="btn sm" onclick="scanPaste('${d.id}')">Scan pasted text</button>
      <button class="btn sm ghost" onclick="document.getElementById('scanbox').classList.remove('show')">Cancel</button></div></div>
    <div style="height:18px"></div>`;
  if(!brands.length){

function wireDropzone(brandId){

/* ===================== SCANNER ===================== */
function setStatus(msg,type){const s=document.getElementById('status');if(!s)return;s.className='status show '+type;s.innerHTML=msg;}
const PROXIES=[
  {make:u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`},
  {make:u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`},
  {make:u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`},
  {make:u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,json:true},
  {make:u=>`https://thingproxy.freeboard.io/fetch/${u}`},
  {make:u=>`https://proxy.cors.sh/${u}`},
];
async function fetchVia(p,url,timeout=9000){
  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(p.make(url),{signal:ctrl.signal,headers:{'Accept':'text/html,*/*'}});
    clearTimeout(t);if(!r.ok)return null;
    if(p.json){const j=await r.json().catch(()=>null);return j&&j.contents?j.contents:null;}
    return await r.text();
  }catch(e){clearTimeout(t);return null;}
}
function _kwsFor(b){return ALIAS[b.n]||[b.n.toLowerCase()];}
function _esc(k){return k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function _hasWord(str,kw){return new RegExp('(?:^|[^a-z0-9])'+_esc(kw)+'(?:[^a-z0-9]|$)').test(str);}
function _countWord(str,kw){const m=str.match(new RegExp('(?:^|[^a-z0-9])'+_esc(kw)+'(?:[^a-z0-9]|$)','g'));return m?m.length:0;}
/* simple whole-word match (used for pasted text) */
function detectBrands(text){const low=(text||'').toLowerCase();return BRANDS.filter(b=>_kwsFor(b).some(k=>_hasWord(low,k)));}
/* smart detection: trust title / logo alt / nav links, ignore incidental body mentions */
function detectBrandsSmart(html){
  let m,title='',og='';
  m=html.match(/<title[^>]*>([^<]+)<\/title>/i);if(m)title=m[1];
  m=html.match(/og:site_name["'][^>]*content=["']([^"']+)/i)||html.match(/content=["']([^"']+)["'][^>]*og:site_name/i);if(m)og=m[1];
  const alts=(html.match(/alt=["']([^"']*)["']/gi)||[]).join(' ');
  const nav=(html.match(/href=["']([^"']*)["']/gi)||[]).join(' ').replace(/[^a-z0-9]+/gi,' ').toLowerCase();
  const strong=(title+' '+og+' '+alts).toLowerCase();
  const body=html.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').toLowerCase();
  const scored=[];
  for(const b of BRANDS){
    const kws=_kwsFor(b);
    const strongHit=kws.some(k=>_hasWord(strong,k));
    const navHit=kws.some(k=>_hasWord(nav,k));
    const bodyCount=kws.reduce((s,k)=>s+_countWord(body,k),0);
    if(strongHit||navHit||bodyCount>=6){
      scored.push({b,score:(strongHit?5:0)+(navHit?4:0)+Math.min(bodyCount,3)});
    }
  }
  scored.sort((a,z)=>z.score-a.score);
  return scored.map(s=>s.b);
}
function decodeEnt(s){return (s||'').replace(/&amp;/g,'&').replace(/&#0?39;/g,"'").replace(/&#x27;/gi,"'").replace(/&quot;/g,'"').replace(/&#0?38;/g,'&').replace(/\s+/g,' ').trim();}
function domainName(url){try{let host=new URL(url).hostname.replace(/^www\./,'');let base=host.split('.')[0];return base.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}catch(e){return 'New Dealership';}}
function extractName(html,url){
  let m=html.match(/<meta[^>]+(?:property|name)=["']og:site_name["'][^>]*?content=["']([^"']+)["']/i)
      ||html.match(/content=["']([^"']+)["'][^>]*?(?:property|name)=["']og:site_name["']/i);
  if(m){const n=decodeEnt(m[1]);if(n.length>=3&&n.length<=60)return n;}
  m=html.match(/<title[^>]*>([^<]+)<\/title>/i);
  if(m){
    const segs=m[1].split(/[|–—:·]|\s-\s/).map(s=>decodeEnt(s).replace(/^\s*(home|welcome to|official site)\s*/ig,'').trim());
    const good=segs.find(s=>s.length>=3&&s.length<=60&&!/^(home|menu|new|used|inventory|specials)$/i.test(s));
    if(good)return good;
  }
  return domainName(url);
}
async function fetchSiteInfo(url,onProgress){
  for(let i=0;i<PROXIES.length;i++){
    onProgress&&onProgress(i+1,PROXIES.length);
    const html=await fetchVia(PROXIES[i],url);
    if(html&&html.length>200){
      return {name:extractName(html,url),brands:detectBrandsSmart(html),ok:true};
    }
  }
  return {name:domainName(url),brands:[],ok:false};
}
function setLoading(msg,withBar){const s=document.getElementById('status');if(!s)return;
  s.className='status show load';s.innerHTML=`<span class="spinner"></span>${msg}`+(withBar?`<div class="scanbar"><i></i></div>`:'');}
async function addDetected(dealerId,found){
  const existing=(await dbByIndex('brands','dealerId',dealerId)).map(b=>b.name.toLowerCase());
  let added=0;for(const b of found){if(existing.includes(b.n.toLowerCase()))continue;
    await dbPut('brands',{id:uid(),dealerId,name:b.n,color:b.c,logo:null,createdAt:Date.now()});added++;}
  return added;
}
async function addDealerFromUrl(){
  const inp=document.getElementById('newUrl');let url=(inp.value||'').trim();
  if(!url){inp.focus();return;}
  if(!/^https?:\/\//.test(url))url='https://'+url;
  const btn=document.getElementById('addBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Reading…';
  setLoading(`Reading <b>${esc(url)}</b> … finding the dealership name and its brands.`,true);
  const info=await fetchSiteInfo(url,(i,n)=>setLoading(`Reading the site… trying source ${i} of ${n}.`,true));
  const d={id:uid(),name:info.name,url,createdAt:Date.now()};
  await dbPut('dealers',d);
  if(info.brands.length)await addDetected(d.id,info.brands);
  await go({name:'dealer',dealerId:d.id});
  if(info.ok&&info.brands.length)
    setStatus(`✅ Added <b>${esc(info.name)}</b> — found ${info.brands.length} brand${info.brands.length>1?'s':''}: ${info.brands.map(b=>b.n).join(', ')}.`,'ok');
  else if(info.ok)
    setStatus(`Added <b>${esc(info.name)}</b>, but no known brands matched on the page. Add them with “Add manufacturer”, or <a onclick="document.getElementById('scanbox').classList.add('show')">paste the page text</a>.`,'info');
  else
    setStatus(`Added <b>${esc(info.name)}</b> from the web address, but the site blocked a direct read (common for dealer sites). Hit “Auto-detect brands” to retry, or <a onclick="document.getElementById('scanbox').classList.add('show')">paste the page text</a>.`,'err');
}
async function scanDealer(dealerId){
  const d=await dbGet('dealers',dealerId);
  if(!d.url){setStatus(`No URL saved. Add manufacturers manually, or <a onclick="document.getElementById('scanbox').classList.add('show')">paste the page text</a>.`,'info');return;}
  setLoading(`Scanning <b>${esc(d.url)}</b> …`,true);
  const info=await fetchSiteInfo(d.url,(i,n)=>setLoading(`Scanning the site… trying source ${i} of ${n}.`,true));
  if(info.ok&&info.brands.length){
    const added=await addDetected(dealerId,info.brands);
    if((d.name===domainName(d.url))&&info.name&&info.name!==d.name){d.name=info.name;await dbPut('dealers',d);}
    setStatus(`✅ Found ${info.brands.length} brand${info.brands.length>1?'s':''}: ${info.brands.map(f=>f.n).join(', ')}.${added?` Added ${added} new.`:' All already added.'}`,'ok');
    renderDealer(dealerId);return;
  }
  if(info.ok){setStatus(`Read the site, but matched no known brands. Add them manually, or <a onclick="document.getElementById('scanbox').classList.add('show')">paste the page text</a>.`,'info');return;}
  setStatus(`Couldn’t read that site directly (dealer sites often block it). Add manufacturers manually, or <a onclick="document.getElementById('scanbox').classList.add('show')">paste the page text</a> to auto-detect.`,'err');
}
async function scanPaste(dealerId){
  const found=detectBrands(document.getElementById('pastearea').value);
  document.getElementById('scanbox').classList.remove('show');
  if(!found.length){setStatus('No known brands found in that text.','err');return;}
  const added=await addDetected(dealerId,found);
  setStatus(`✅ Found ${found.length}: ${found.map(f=>f.n).join(', ')}.${added?` Added ${added} new.`:''}`,'ok');
  renderDealer(dealerId);
}

function updateShareCount(){const n=shareSel.size;const c=document.getElementById('selCount');if(c)c.textContent=n;const g=document.getElementById('genShareBtn');if(g)g.disabled=n===0;}
function toggleShare(id,el){if(shareSel.has(id)){shareSel.delete(id);el.classList.remove('sel');}else{shareSel.add(id);el.classList.add('sel');}updateShareCount();}

function blobToDataURL(blob){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob);});}
async function generateShareFile(dealerId){
  const btn=document.getElementById('genShareBtn');btn.disabled=true;btn.textContent='Building…';
  const d=await dbGet('dealers',dealerId);
  const brands=(await dbByIndex('brands','dealerId',dealerId)).sort((a,b)=>a.name.localeCompare(b.name));
  const groups=[];
  for(const b of brands){
    const assets=(await dbByIndex('assets','brandId',b.id)).filter(a=>shareSel.has(a.id));
    if(!assets.length)continue;
    const items=[];
    for(const a of assets){items.push({id:a.id,name:a.name,data:await blobToDataURL(a.blob)});}
    groups.push({brand:b.name,color:b.color,items});
  }
  const payload={dealer:d.name,generatedAt:new Date().toISOString(),groups};
  const fileHtml=buildShareHTML(payload);
  const blob=new Blob([fileHtml],{type:'text/html'});
  const u=URL.createObjectURL(blob);const link=document.createElement('a');
  link.href=u;link.download=`${d.name.replace(/[^a-z0-9]+/gi,'-').toLowerCase()}-approval-sheet.html`;link.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
  btn.disabled=false;btn.textContent='Generate share file ↓';
}

</style></head><body><div class="wrap">
<h1>${esc(payload.dealer)}</h1><p class="sub">Emblem &amp; badge approvals · prepared for your review</p>
<div class="note"><b>How to use:</b> Check <b>Approve</b> on any designs you’d like to move forward with. Add a note if you want changes. When you’re done, click <b>Export approvals</b> at the bottom and send the downloaded file back. Nothing here needs internet — your choices stay on this page until you export.</div>
<div id="root"></div>
<div class="done" id="done">Approvals file downloaded. Please send it back — thank you!</div>
</div>
<div class="bar"><div class="c"><b id="okc">0</b> approved of <span id="totc">0</span></div>
<div style="display:flex;gap:10px"><button class="btn ghost" onclick="window.print()">Print / Save PDF</button>
<button class="btn" onclick="exportApprovals()">Export approvals ↓</button></div></div>
<script>
const DATA=${data};
const state={};let total=0;
const root=document.getElementById('root');
DATA.groups.forEach(g=>{
  const sec=document.createElement('div');sec.className='bgrp';
  let h='<div class="bhead"><span class="wm" style="background:'+g.color+'">'+g.brand+'</span><b>'+g.brand+'</b></div><div class="grid">';
  g.items.forEach(it=>{total++;state[it.id]={brand:g.brand,name:it.name,approved:false,note:''};
    h+='<div class="card" id="card_'+it.id+'"><img src="'+it.data+'" alt="'+it.name+'"><div class="cbody">'+
    '<div class="cname">'+it.name+'</div>'+
    '<label class="approve"><input type="checkbox" onchange="setApprove(\\''+it.id+'\\',this.checked)"> Approve</label>'+
    '<input class="cnote" placeholder="Notes (optional)" oninput="setNote(\\''+it.id+'\\',this.value)"></div></div>';
  });
  h+='</div>';sec.innerHTML=h;root.appendChild(sec);
});
document.getElementById('totc').textContent=total;
function refresh(){const ok=Object.values(state).filter(s=>s.approved).length;document.getElementById('okc').textContent=ok;}
function setApprove(id,v){state[id].approved=v;document.getElementById('card_'+id).classList.toggle('ok',v);refresh();}
function setNote(id,v){state[id].note=v;}
function exportApprovals(){
  const approvals=Object.entries(state).map(([id,s])=>({id,brand:s.brand,name:s.name,approved:s.approved,note:s.note}));
  const out={dealer:DATA.dealer,reviewedAt:new Date().toISOString(),approvedCount:approvals.filter(a=>a.approved).length,approvals};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=u;a.download=(DATA.dealer.replace(/[^a-z0-9]+/gi,'-').toLowerCase())+'-approvals.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
  document.getElementById('done').style.display='block';
}
<\/script></body></html>`;
}

/* ===================== CHATGPT PROMPT GENERATOR ===================== */
let _prompts={};
function splitHead(c){ if(c.head.length>=2) return {hero:c.head[0],ribbon:c.head[c.head.length-1]}; return {hero:c.head[0],ribbon:c.tag||'EVENT'}; }
function paletteText(brand,color){return `the official ${brand} colors — ${color} as the dominant color, with polished chrome silver and dark accents`;}

function styleSpec(dealer,brand,color){
  return `STYLE REFERENCE — read first.
You are creating premium automotive dealership sale graphics. The look is a PHOTOREALISTIC 3D METALLIC EMBLEM, like a glossy chrome trophy crest: heavy brushed-silver and chrome beveled borders, a layered shield / crest shape, a deep glossy enamel center, dramatic studio lighting, sharp realistic reflections, ultra-detailed, clean and high-end. Square 1:1 composition, subject centered, on a fully TRANSPARENT background (or pure solid white if transparency isn't possible).

BRAND: ${brand}. Use ${paletteText(brand,color)}.
DEALERSHIP: "${dealer}".

VERY IMPORTANT OUTPUT RULES:
1. Generate EACH numbered item below as its OWN SEPARATE image, one at a time, so every badge and every background can be downloaded as an individual file.
2. Do NOT combine multiple designs into a single image or a collage.
3. Keep text crisp and correctly spelled exactly as written in quotes.
4. Place the ${brand} logo emblem at the very top of each badge (use your dealership's official ${brand} logo artwork).`;
}

function badgePrompt(dealer,brand,color,c){
  const {hero,ribbon}=splitHead(c);
  return `BADGE — ${c.label}
Photorealistic 3D metallic dealership emblem badge, square 1:1, transparent background. Glossy chrome and brushed-silver beveled crest/shield frame with a deep glossy ${color} ${brand} enamel center and subtle radial shine. At the top, the ${brand} logo emblem in chrome. A silver banner ribbon across the upper third reads "${dealer}" in embossed metallic lettering. A large central 3D chrome headline reads "${hero}". A lower silver ribbon reads "${ribbon}". Seasonal decoration: ${c.motif}. Lighting: dramatic studio reflections, ultra-detailed, premium. ${paletteText(brand,color)}. No watermark, no extra text.`;
}
function backgroundPrompt(dealer,brand,color,c){
  return `BACKGROUND — ${c.label}
Wide 16:9 promotional background for a ${brand} dealership "${c.label}" sales event. ${c.bg}. Built around ${color} with chrome-silver light streaks, photorealistic, premium and clean, high resolution. Leave open, uncluttered space on the left and center for text to be added later. IMPORTANT: no text, no letters, no logos in this image — background art only.`;
}

async function generatePromptsModal(brandId){
  const b=await dbGet('brands',brandId);
  const d=await dbGet('dealers',b.dealerId);
  const dealer=d.name, brand=b.name, color=b.color;
  _prompts={};
  _prompts.style=styleSpec(dealer,brand,color);
  const allParts=[_prompts.style];
  let body='';
  CAMPAIGNS.forEach(c=>{
    const bp=badgePrompt(dealer,brand,color,c), gp=backgroundPrompt(dealer,brand,color,c);
    _prompts[c.id+'_badge']=bp; _prompts[c.id+'_bg']=gp;
    allParts.push(bp,gp);
    body+=`<div class="camphead"><span class="swatch" style="background:${color}"></span>${esc(c.label)}</div>
      <div class="pblock"><div class="ph"><span class="pt">Badge <small>separate image</small></span>
        <button class="btn sm ghost" onclick="copyPrompt('${c.id}_badge',this)">Copy</button></div>
        <textarea readonly>${esc(bp)}</textarea></div>
      <div class="pblock"><div class="ph"><span class="pt">Background <small>separate image</small></span>
        <button class="btn sm ghost" onclick="copyPrompt('${c.id}_bg',this)">Copy</button></div>
        <textarea readonly>${esc(gp)}</textarea></div>`;
  });
  _prompts.all=allParts.join('\n\n———\n\n');

  modal.classList.add('wide');
  modal.innerHTML=`<h3>ChatGPT image prompts — ${esc(brand)}</h3>
    <p class="h">Paste these into ChatGPT (image generation) for <b>${esc(dealer)}</b>. Run each one separately so every badge &amp; background downloads as its own image. ${CAMPAIGNS.length} seasons · ${CAMPAIGNS.length*2} images.</p>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn" onclick="copyPrompt('all',this)">⧉ Copy everything</button>
      <button class="btn ghost" onclick="copyPrompt('style',this)">Copy style block only</button>
      <button class="btn ghost" onclick="closeModal()">Done</button>
    </div>
    <div class="promptscroll">
      <div class="pblock style"><div class="ph"><span class="pt">① Style block <small>paste this first</small></span>
        <button class="btn sm ghost" onclick="copyPrompt('style',this)">Copy</button></div>
        <textarea readonly style="min-height:150px">${esc(_prompts.style)}</textarea></div>
      ${body}
    </div>`;
  overlay.classList.add('show');
}
function copyPrompt(key,btn){
  const text=_prompts[key]||'';
  const done=()=>{if(btn){const t=btn.textContent;btn.textContent='Copied ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent=t;btn.classList.remove('copied');},1400);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));}
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);done&&done();}
